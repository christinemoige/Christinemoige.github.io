<header>
  <!-- PROFILE PICTURE - FIRST -->
  {% if site.logo %}
    <div style="text-align: center; margin-bottom: 20px;">
      <img src="{{ site.logo | relative_url }}" alt="Profile Picture" style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto;">
    </div>
  {% endif %}

  <!-- TITLE - SECOND -->
  <h1 style="text-align: center;"><a href="{{ '/' | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
  
  <!-- DESCRIPTION - THIRD -->
  <p style="text-align: center; font-size: 14px; color: #666;">{{ site.description | default: site.github.project_tagline }}</p>
</header>
